<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Sorting Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
:root {
    --bg: #0f172a;
    --surface: rgba(30, 41, 59, 0.7);
    --border: rgba(255, 255, 255, 0.1);
    --text: #f8fafc;
    --text-muted: #94a3b8;
    --primary: #3b82f6;
    --primary-hover: #2563eb;
    --accent-red: #ef4444;
    --accent-green: #10b981;
    --accent-purple: #8b5cf6;
    --accent-yellow: #f59e0b;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Outfit', sans-serif;
    background-color: var(--bg);
    background-image: 
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.glass {
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
}

.app-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    padding: 1rem 2rem;
    background: var(--surface);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 16px;
}

h1 {
    font-size: 1.5rem;
    font-weight: 600;
    background: linear-gradient(to right, #60a5fa, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.controls {
    display: flex;
    gap: 1rem;
}

select, .btn {
    font-family: inherit;
    font-size: 1rem;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(15, 23, 42, 0.8);
    color: var(--text);
    outline: none;
    transition: all 0.2s;
}

select:focus {
    border-color: var(--primary);
}

.btn {
    cursor: pointer;
    background: var(--surface);
}

.btn:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.1);
}

.btn.primary {
    background: var(--primary);
    border-color: var(--primary);
    font-weight: 600;
}

.btn.primary:hover:not(:disabled) {
    background: var(--primary-hover);
}

.btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

main {
    display: flex;
    gap: 2rem;
    flex: 1;
    min-height: 0;
}

.visualization-area {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow-x: auto;
}

.sidebar {
    width: 350px;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

.info-panel, .log-panel {
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.log-panel {
    flex: 1;
    overflow: hidden;
}

h2 {
    font-size: 1.25rem;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.5rem;
}

.playback-controls {
    display: flex;
    justify-content: center;
    gap: 1rem;
}

.icon-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1.25rem;
}

.speed-control {
    display: flex;
    align-items: center;
    gap: 1rem;
}

.speed-control input {
    flex: 1;
}

.action-text {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--primary);
    min-height: 3.5rem;
}

.log-list {
    list-style: none;
    overflow-y: auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.log-list li {
    font-size: 0.9rem;
    color: var(--text-muted);
    padding: 0.5rem;
    border-radius: 4px;
    background: rgba(0, 0, 0, 0.2);
}

.log-list li.active {
    color: var(--text);
    background: rgba(59, 130, 246, 0.2);
    border-left: 2px solid var(--primary);
}

/* Array and Pointers */
.array-container {
    display: flex;
    position: relative;
    margin-top: 120px;
    padding: 2rem;
    background: rgba(0,0,0,0.2);
    border-radius: 24px;
    border: 1px solid var(--border);
    min-height: 200px;
}

.array-element {
    width: 140px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: absolute;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.array-element.comparing {
    border-color: var(--accent-yellow);
    transform: translateY(-10px);
    box-shadow: 0 10px 20px rgba(245, 158, 11, 0.2);
}

.array-element.swapping {
    border-color: var(--accent-red);
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2);
}

.array-element.sorted {
    border-color: var(--accent-green);
    background: rgba(16, 185, 129, 0.1);
}

.array-element.pivot {
    border-color: var(--accent-purple);
    box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
}

.element-header {
    text-align: center;
    font-weight: 600;
    font-size: 1.2rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.5rem;
    margin-bottom: 0.5rem;
}

.element-stat {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
}

.element-stat .label {
    color: var(--text-muted);
}

.address-label {
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    font-family: monospace;
    font-size: 0.85rem;
    color: var(--text-muted);
    background: rgba(0,0,0,0.5);
    padding: 2px 6px;
    border-radius: 4px;
}

/* Pointers */
.pointers-container {
    position: absolute;
    top: -120px;
    left: 0;
    width: 100%;
    height: 120px;
    pointer-events: none;
    z-index: 10;
}

.pointer {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    transform: translateX(-50%);
}

.pointer .arrow {
    width: 2px;
    height: 15px;
    background: currentColor;
    position: relative;
    margin-top: 4px;
}

.pointer .arrow::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: -4px;
    border-width: 5px 5px 0 5px;
    border-style: solid;
    border-color: currentColor transparent transparent transparent;
}

.pointer .label {
    background: currentColor;
    color: #fff;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    white-space: nowrap;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

.ptr-start { color: #3b82f6; }
.ptr-end { color: #f43f5e; }
.ptr-j { color: #f59e0b; }
.ptr-j1 { color: #eab308; }
.ptr-moving { color: #f59e0b; }
.ptr-limit { color: #8b5cf6; }

    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Bus Line Sorting Visualizer</h1>
            <div class="controls">
                <select id="algorithm-select">
                    <option value="bubble">Bubble Sort</option>
                    <option value="quick">Quick Sort</option>
                </select>
                <select id="metric-select">
                    <option value="name">Sort by Name</option>
                    <option value="distance">Sort by Distance</option>
                    <option value="duration">Sort by Duration</option>
                    <option value="frequency">Sort by Frequency</option>
                </select>
                <button id="btn-start" class="btn primary">Start Simulation</button>
            </div>
        </header>

        <main>
            <div class="visualization-area">
                <div class="pointers-container" id="pointers-container"></div>
                <div class="array-container" id="array-container"></div>
            </div>
            
            <aside class="sidebar">
                <div class="info-panel glass">
                    <h2>Playback Controls</h2>
                    <div class="playback-controls">
                        <button id="btn-prev" class="btn icon-btn" disabled>⏮</button>
                        <button id="btn-play-pause" class="btn icon-btn" disabled>▶</button>
                        <button id="btn-next" class="btn icon-btn" disabled>⏭</button>
                    </div>
                    <div class="speed-control">
                        <label>Speed:</label>
                        <input type="range" id="speed-slider" min="1" max="10" value="5">
                    </div>
                    <div class="progress-info">
                        Step <span id="step-current">0</span> / <span id="step-total">0</span>
                    </div>
                </div>
                
                <div class="log-panel glass">
                    <h2>Action Log</h2>
                    <div id="action-text" class="action-text">Ready to start.</div>
                    <ul id="log-list" class="log-list"></ul>
                </div>
            </aside>
        </main>
    </div>

    <script>
const BASE_ADDR = 0x1000;
const ELEMENT_SIZE = 0x40; // 64 bytes
const GAP = 24; // 1.5rem in px
const ELEMENT_WIDTH = 140; 
const TOTAL_ELEMENT_WIDTH = ELEMENT_WIDTH + GAP;

const initialState = [
    { name: "Dan", distance: 300, duration: 60, frequency: 10 },
    { name: "Alice", distance: 100, duration: 40, frequency: 30 },
    { name: "Charlie", distance: 500, duration: 20, frequency: 5 },
    { name: "Bob", distance: 200, duration: 50, frequency: 20 }
];

let frames = [];
let currentFrameIndex = 0;
let playing = false;
let playInterval;

const arrayContainer = document.getElementById('array-container');
const pointersContainer = document.getElementById('pointers-container');
const actionText = document.getElementById('action-text');
const logList = document.getElementById('log-list');
const btnStart = document.getElementById('btn-start');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnPlayPause = document.getElementById('btn-play-pause');
const stepCurrent = document.getElementById('step-current');
const stepTotal = document.getElementById('step-total');
const speedSlider = document.getElementById('speed-slider');

function formatAddr(index) {
    return `0x${(BASE_ADDR + index * ELEMENT_SIZE).toString(16).toUpperCase()}`;
}

function cloneArray(arr) {
    return JSON.parse(JSON.stringify(arr));
}

function compare(a, b, metric) {
    if (metric === 'name') {
        return a.name.localeCompare(b.name);
    }
    return a[metric] - b[metric];
}

function simulateBubbleSort(data, metric) {
    frames = [];
    let arr = cloneArray(data);
    let len = arr.length;
    
    frames.push({
        arr: cloneArray(arr),
        pointers: [
            { id: 'start', label: 'start', index: 0, class: 'ptr-start', level: 0 },
            { id: 'end', label: 'end', index: len, class: 'ptr-end', level: 0 }
        ],
        highlights: [],
        action: `Starting Bubble Sort by ${metric}`
    });

    for (let i = 0; i < len; i++) {
        for (let j = 0; j < len - i - 1; j++) {
            let cmpVal = compare(arr[j], arr[j+1], metric);
            
            frames.push({
                arr: cloneArray(arr),
                pointers: [
                    { id: 'start', label: 'start', index: 0, class: 'ptr-start', level: 0 },
                    { id: 'end', label: 'end', index: len, class: 'ptr-end', level: 0 },
                    { id: 'j', label: 'start + j', index: j, class: 'ptr-j', level: 1 },
                    { id: 'j1', label: 'start + j + 1', index: j+1, class: 'ptr-j1', level: 2 }
                ],
                highlights: [ {index: j, type: 'comparing'}, {index: j+1, type: 'comparing'} ],
                action: `Comparing ${arr[j].name} and ${arr[j+1].name}`
            });

            if (cmpVal > 0) {
                frames.push({
                    arr: cloneArray(arr),
                    pointers: [
                        { id: 'j', label: 'start + j', index: j, class: 'ptr-j', level: 1 },
                        { id: 'j1', label: 'start + j + 1', index: j+1, class: 'ptr-j1', level: 2 }
                    ],
                    highlights: [ {index: j, type: 'swapping'}, {index: j+1, type: 'swapping'} ],
                    action: `Swapping ${arr[j].name} and ${arr[j+1].name}`
                });

                let tmp = arr[j];
                arr[j] = arr[j+1];
                arr[j+1] = tmp;

                frames.push({
                    arr: cloneArray(arr),
                    pointers: [
                        { id: 'j', label: 'start + j', index: j, class: 'ptr-j', level: 1 },
                        { id: 'j1', label: 'start + j + 1', index: j+1, class: 'ptr-j1', level: 2 }
                    ],
                    highlights: [],
                    action: `Swap complete`
                });
            }
        }
        
        frames.push({
            arr: cloneArray(arr),
            pointers: [
                { id: 'start', label: 'start', index: 0, class: 'ptr-start', level: 0 },
                { id: 'end', label: 'end', index: len, class: 'ptr-end', level: 0 }
            ],
            highlights: [ {index: len - i - 1, type: 'sorted'} ],
            action: `Element at ${formatAddr(len - i - 1)} is fully sorted`
        });
    }

    frames.push({
        arr: cloneArray(arr),
        pointers: [],
        highlights: arr.map((_, idx) => ({index: idx, type: 'sorted'})),
        action: `Bubble Sort Complete!`
    });
}

function simulateQuickSort(data, metric) {
    frames = [];
    let arr = cloneArray(data);
    let len = arr.length;

    frames.push({
        arr: cloneArray(arr),
        pointers: [
            { id: 'start', label: 'start', index: 0, class: 'ptr-start', level: 0 },
            { id: 'end', label: 'end', index: len, class: 'ptr-end', level: 0 }
        ],
        highlights: [],
        action: `Starting Quick Sort by ${metric}`
    });

    function partition(start, end) {
        if (start >= end) return start;

        let pivotIndex = end - 1;
        let limitIndex = start - 1;

        frames.push({
            arr: cloneArray(arr),
            pointers: [
                { id: 'start', label: 'start', index: start, class: 'ptr-start', level: 0 },
                { id: 'end', label: 'end', index: end, class: 'ptr-end', level: 0 },
                { id: 'limit', label: 'limit (smaller <=)', index: limitIndex, class: 'ptr-limit', level: 1 },
                { id: 'pivot', label: 'pivot', index: pivotIndex, class: 'ptr-end', level: 2 }
            ],
            highlights: [ {index: pivotIndex, type: 'pivot'} ],
            action: `Partitioning. Pivot is ${arr[pivotIndex].name}. 'limit' tracks the boundary of smaller elements.`
        });

        for (let moving = start; moving < end - 1; moving++) {
            frames.push({
                arr: cloneArray(arr),
                pointers: [
                    { id: 'limit', label: 'limit', index: limitIndex, class: 'ptr-limit', level: 1 },
                    { id: 'moving', label: 'moving', index: moving, class: 'ptr-moving', level: 2 },
                    { id: 'pivot', label: 'pivot', index: pivotIndex, class: 'ptr-end', level: 3 }
                ],
                highlights: [ {index: moving, type: 'comparing'}, {index: pivotIndex, type: 'pivot'} ],
                action: `Comparing ${arr[moving].name} with pivot ${arr[pivotIndex].name}.`
            });

            let isSmaller = false;
            let cmpVal = compare(arr[moving], arr[pivotIndex], metric);
            if (metric === 'name') isSmaller = cmpVal <= 0; 
            else isSmaller = arr[moving][metric] <= arr[pivotIndex][metric];

            if (isSmaller) {
                limitIndex++;
                
                frames.push({
                    arr: cloneArray(arr),
                    pointers: [
                        { id: 'limit', label: 'limit++ (expand)', index: limitIndex, class: 'ptr-limit', level: 1 },
                        { id: 'moving', label: 'moving', index: moving, class: 'ptr-moving', level: 2 },
                        { id: 'pivot', label: 'pivot', index: pivotIndex, class: 'ptr-end', level: 3 }
                    ],
                    highlights: [ {index: limitIndex, type: 'swapping'}, {index: moving, type: 'swapping'} ],
                    action: `It is smaller! Expanding the 'smaller region' (limit++) and swapping to include it.`
                });

                let tmp = arr[limitIndex];
                arr[limitIndex] = arr[moving];
                arr[moving] = tmp;

                 frames.push({
                    arr: cloneArray(arr),
                    pointers: [
                        { id: 'limit', label: 'limit', index: limitIndex, class: 'ptr-limit', level: 1 },
                        { id: 'moving', label: 'moving', index: moving, class: 'ptr-moving', level: 2 }
                    ],
                    highlights: [ {index: pivotIndex, type: 'pivot'} ],
                    action: `Swap complete. ${arr[limitIndex].name} is now safely inside the smaller region.`
                });
            } else {
                frames.push({
                    arr: cloneArray(arr),
                    pointers: [
                        { id: 'limit', label: 'limit', index: limitIndex, class: 'ptr-limit', level: 1 },
                        { id: 'moving', label: 'moving', index: moving, class: 'ptr-moving', level: 2 },
                        { id: 'pivot', label: 'pivot', index: pivotIndex, class: 'ptr-end', level: 3 }
                    ],
                    highlights: [ {index: pivotIndex, type: 'pivot'} ],
                    action: `It is larger. Doing nothing, so it naturally becomes part of the larger region.`
                });
            }
        }

        limitIndex++;
        frames.push({
            arr: cloneArray(arr),
            pointers: [
                { id: 'limit', label: 'limit+1', index: limitIndex, class: 'ptr-limit', level: 1 },
                { id: 'pivot', label: 'pivot', index: pivotIndex, class: 'ptr-end', level: 2 }
            ],
            highlights: [ {index: limitIndex, type: 'swapping'}, {index: pivotIndex, type: 'swapping'} ],
            action: `Loop done. Placing pivot immediately after the smaller region (at limit+1).`
        });

        let tmp = arr[limitIndex];
        arr[limitIndex] = arr[pivotIndex];
        arr[pivotIndex] = tmp;

        frames.push({
            arr: cloneArray(arr),
            pointers: [
                { id: 'pivot_placed', label: 'pivot_placed', index: limitIndex, class: 'ptr-start', level: 0 }
            ],
            highlights: [ {index: limitIndex, type: 'sorted'} ],
            action: `Pivot placed at its final, sorted position ${formatAddr(limitIndex)}.`
        });

        return limitIndex;
    }

    function qs(start, end) {
        if (start >= end) return;
        let p = partition(start, end);
        qs(start, p);
        qs(p + 1, end);
    }

    qs(0, len);

    frames.push({
        arr: cloneArray(arr),
        pointers: [],
        highlights: arr.map((_, idx) => ({index: idx, type: 'sorted'})),
        action: `Quick Sort Complete!`
    });
}

function renderFrame(index) {
    if (index < 0 || index >= frames.length) return;
    currentFrameIndex = index;
    const frame = frames[index];

    arrayContainer.innerHTML = '';
    
    let maxPointerIndex = frame.arr.length; 
    frame.pointers.forEach(p => { if(p.index > maxPointerIndex) maxPointerIndex = p.index; });
    arrayContainer.style.width = `${(maxPointerIndex + 1) * TOTAL_ELEMENT_WIDTH}px`;

    // Persist sorted elements across frames conceptually (basic check)
    let sortedIndices = frame.highlights.filter(h => h.type === 'sorted').map(h => h.index);

    frame.arr.forEach((bus, i) => {
        let el = document.createElement('div');
        el.className = 'array-element';
        
        let highlight = frame.highlights.find(h => h.index === i);
        if (highlight) {
            el.classList.add(highlight.type);
        } else if (sortedIndices.includes(i)) {
            el.classList.add('sorted');
        }

        el.style.left = `${i * TOTAL_ELEMENT_WIDTH + 32}px`; // +32 for padding

        el.innerHTML = `
            <div class="element-header">${bus.name}</div>
            <div class="element-stat"><span class="label">Dist:</span> ${bus.distance}</div>
            <div class="element-stat"><span class="label">Dur:</span> ${bus.duration}</div>
            <div class="element-stat"><span class="label">Freq:</span> ${bus.frequency}</div>
            <div class="address-label">${formatAddr(i)}</div>
        `;
        arrayContainer.appendChild(el);
    });

    pointersContainer.innerHTML = '';
    frame.pointers.forEach(p => {
        let el = document.createElement('div');
        el.className = `pointer ${p.class}`;
        
        let leftPos = p.index * TOTAL_ELEMENT_WIDTH + (ELEMENT_WIDTH / 2);
        if (p.index < 0) leftPos = -TOTAL_ELEMENT_WIDTH + (ELEMENT_WIDTH / 2);

        el.style.left = `${leftPos + 32}px`; 

        el.innerHTML = `
            <div class="label">${p.label}</div>
            <div class="arrow"></div>
        `;
        
        let offset = 90 - (p.level * 30); 
        el.style.top = `${offset}px`;

        pointersContainer.appendChild(el);
    });

    actionText.textContent = frame.action;
    stepCurrent.textContent = currentFrameIndex + 1;
    stepTotal.textContent = frames.length;

    if (!logList.children[index] && index === logList.children.length) {
        let li = document.createElement('li');
        li.textContent = `[${index + 1}] ${frame.action}`;
        logList.appendChild(li);
    } else if (logList.children.length === 0) {
        // rebuild log list if skipping around
        frames.forEach((f, i) => {
            let li = document.createElement('li');
            li.textContent = `[${i + 1}] ${f.action}`;
            logList.appendChild(li);
        });
    }
    
    Array.from(logList.children).forEach((li, i) => {
        li.className = i === index ? 'active' : '';
        if (i === index) li.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    btnPrev.disabled = currentFrameIndex === 0;
    btnNext.disabled = currentFrameIndex === frames.length - 1;
}

function nextStep() {
    if (currentFrameIndex < frames.length - 1) renderFrame(currentFrameIndex + 1);
    else stopPlayback();
}

function prevStep() {
    if (currentFrameIndex > 0) renderFrame(currentFrameIndex - 1);
}

function togglePlayback() {
    playing = !playing;
    btnPlayPause.textContent = playing ? '⏸' : '▶';
    if (playing) {
        if (currentFrameIndex === frames.length - 1) renderFrame(0);
        let speed = 11 - parseInt(speedSlider.value); 
        playInterval = setInterval(nextStep, speed * 200);
    } else {
        clearInterval(playInterval);
    }
}

function stopPlayback() {
    playing = false;
    btnPlayPause.textContent = '▶';
    clearInterval(playInterval);
}

speedSlider.addEventListener('change', () => {
    if (playing) {
        stopPlayback();
        togglePlayback();
    }
});

btnStart.addEventListener('click', () => {
    const algo = document.getElementById('algorithm-select').value;
    const metric = document.getElementById('metric-select').value;
    
    stopPlayback();
    logList.innerHTML = '';
    
    if (algo === 'bubble') simulateBubbleSort(initialState, metric);
    else simulateQuickSort(initialState, metric);

    btnPrev.disabled = false;
    btnNext.disabled = false;
    btnPlayPause.disabled = false;

    renderFrame(0);
});

btnNext.addEventListener('click', () => { stopPlayback(); nextStep(); });
btnPrev.addEventListener('click', () => { stopPlayback(); prevStep(); });
btnPlayPause.addEventListener('click', togglePlayback);

// Initial render to show empty array
frames = [{
    arr: cloneArray(initialState),
    pointers: [],
    highlights: [],
    action: "Select algorithm and metric, then click Start Simulation"
}];
renderFrame(0);
btnPrev.disabled = true;
btnNext.disabled = true;
btnPlayPause.disabled = true;
    </script>
</body>
